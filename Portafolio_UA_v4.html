<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Unidades Académicas — PUCV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D2355;--blue:#1B4FA8;--blue-mid:#2E6FD9;--blue-light:#EBF3FF;
  --green:#1A7A3A;--green-light:#E8F5EC;
  --amber:#B45309;--amber-light:#FEF3C7;
  --border:#E2E8F0;--bg:#F0F4FA;--white:#FFFFFF;
  --text:#0F172A;--muted:#64748B;--subtle:#94A3B8;
  --r-sm:8px;--r-md:12px;--r-lg:20px;--r-xl:24px;
  --shadow-sm:0 1px 3px rgba(13,35,85,.07);
  --shadow-md:0 6px 24px rgba(13,35,85,.09);
  --shadow-lg:0 14px 44px rgba(13,35,85,.13);
  --font-b:'Plus Jakarta Sans',sans-serif;
  --font-m:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ───── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(13,35,85,.06)}
.topbar-inner{display:flex;align-items:stretch;min-height:72px}
.topbar-sponsors{display:flex;align-items:center;flex-shrink:0;border-right:1px solid var(--border)}
.sponsor-block{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 22px;position:relative}
.sponsor-block:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;height:60%;width:1px;background:var(--border)}
.logo-dii{height:48px;max-width:200px;object-fit:contain}
.logo-ines{height:42px;max-width:160px;object-fit:contain}
.topbar-center{flex:1;background:linear-gradient(135deg,#0D2355 0%,#1B4FA8 60%,#2E6FD9 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 32px;position:relative;overflow:hidden}
.topbar-center::before{content:'';position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.banner-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;text-align:center;position:relative}
.banner-sub{font-size:11px;color:rgba(255,255,255,.5);text-align:center;margin-top:2px;position:relative}
.topbar-right{display:flex;align-items:center;flex-shrink:0;border-left:1px solid var(--border)}
.search-block{padding:10px 18px}
.search-wrap{display:flex;align-items:center;gap:7px;background:#F1F5FF;border-radius:var(--r-sm);padding:7px 12px;border:1px solid var(--border)}
.search-wrap input{border:none;background:transparent;font-family:var(--font-b);font-size:12px;color:var(--text);outline:none;width:210px}
.search-wrap input::placeholder{color:var(--subtle)}

/* ── PAGE ───── */
.page{min-height:calc(100vh - 72px);background:var(--bg)}
.content{max-width:1300px;margin:0 auto;padding:32px 28px}

/* ── BACK ───── */
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--blue);background:var(--white);border:1px solid var(--border);border-radius:20px;padding:6px 16px;cursor:pointer;margin-bottom:24px;transition:all .15s;box-shadow:var(--shadow-sm)}
.back-btn:hover{border-color:var(--blue);box-shadow:var(--shadow-md)}

/* ── SECTION HEADER ───── */
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:20px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.03em;line-height:1.2}
.section-sub{font-size:12px;color:var(--subtle);margin-top:3px}
.section-pills{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.s-pill{font-size:11px;font-weight:600;padding:4px 13px;border-radius:20px;background:var(--blue-light);color:var(--blue);border:1px solid #C5DCF5}

/* ── FACULTY GRID ───── */
.fac-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* ── FACULTY CARD ───── */
.fac-card{
  background:var(--white);border-radius:var(--r-xl);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  cursor:pointer;text-align:left;transition:all .2s;
  overflow:hidden;display:flex;flex-direction:column;
}
.fac-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:transparent}
.fac-card-stripe{height:4px;width:100%;flex-shrink:0}
.fac-card-body{padding:22px 20px 16px;flex:1;display:flex;flex-direction:column;gap:14px}
.fac-logo-wrap{height:62px;display:flex;align-items:center}
.fac-logo-wrap img{max-height:62px;max-width:100%;object-fit:contain;mix-blend-mode:multiply}
.fac-logo-fallback{width:52px;height:52px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white}
.fac-card-name{font-size:14px;font-weight:800;color:var(--navy);line-height:1.3;letter-spacing:-.015em}
.fac-card-stats{display:flex;gap:14px}
.fac-stat{display:flex;flex-direction:column}
.fac-stat-val{font-size:20px;font-weight:800;color:var(--navy);line-height:1;font-family:var(--font-m)}
.fac-stat-lbl{font-size:9.5px;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.fac-card-footer{padding:11px 20px;border-top:1px solid var(--border);background:#FAFBFF;display:flex;align-items:center;justify-content:space-between}
.fac-footer-tags{display:flex;gap:5px;flex-wrap:wrap}
.ind-tag{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--blue-light);color:var(--blue);border:1px solid #C5DCF5}
.fac-card-arrow{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;transition:transform .2s}
.fac-card:hover .fac-card-arrow{transform:translateX(3px)}

/* ── FACULTY DETAIL HEADER ───── */
.fac-detail-header{
  background:var(--white);border-radius:var(--r-xl);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  overflow:hidden;margin-bottom:24px;
}
.fac-detail-stripe{height:5px}
.fac-detail-body{padding:22px 26px;display:flex;align-items:center;gap:22px}
.fac-detail-logo{height:68px;display:flex;align-items:center}
.fac-detail-logo img{max-height:68px;max-width:220px;object-fit:contain;mix-blend-mode:multiply}
.fac-detail-logo-fb{width:60px;height:60px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white}
.fac-detail-sep{width:1px;height:58px;background:var(--border);flex-shrink:0}
.fac-detail-info{flex:1}
.fac-detail-label{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.fac-detail-name{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.02em;line-height:1.2}
.fac-detail-stats{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.fac-ds{display:flex;flex-direction:column}
.fac-ds-val{font-size:20px;font-weight:800;color:var(--navy);line-height:1;font-family:var(--font-m)}
.fac-ds-lbl{font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ── UA GRID ───── */
.ua-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}

/* ── UA CARD ───── */
.ua-card-btn{
  background:var(--white);border-radius:var(--r-lg);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  overflow:hidden;cursor:pointer;text-align:left;
  transition:all .2s;display:flex;flex-direction:column;
}
.ua-card-btn:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:transparent}
.ua-card-top{display:flex;align-items:flex-start;gap:12px;padding:16px 16px 12px}
.ua-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px}
.ua-info{flex:1;min-width:0}
.ua-tipo{font-size:9px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.ua-name{font-size:13.5px;font-weight:700;color:var(--navy);line-height:1.3;letter-spacing:-.01em}
.ua-area{font-size:11px;color:var(--muted);margin-top:2px}
.ua-chevron{color:var(--subtle);font-size:15px;align-self:center;flex-shrink:0;transition:transform .2s}
.ua-card-footer{padding:9px 16px;border-top:1px solid var(--border);background:#FAFBFF;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ua-stat-mini{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.ua-stat-mini strong{color:var(--navy);font-weight:700}

/* ── UA DETAIL PANEL ───── */
.ua-detail{
  background:var(--white);border-radius:var(--r-lg);
  border:1px solid var(--border);box-shadow:var(--shadow-md);
  overflow:hidden;grid-column:1/-1;
}
.ua-detail-stripe{height:3px}
.ua-detail-body{padding:20px 22px}

/* Header row */
.ud-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
.ud-logo-box{
  width:52px;height:52px;border-radius:var(--r-md);overflow:hidden;
  background:#F8FAFF;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ud-logo-box img{max-width:100%;max-height:100%;object-fit:contain;padding:5px;mix-blend-mode:multiply}
.ud-title-block{flex:1}
.ud-fac-tag{display:inline-flex;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;margin-bottom:5px;border:1px solid}
.ud-title{font-size:16px;font-weight:700;color:var(--navy);line-height:1.25;letter-spacing:-.015em}
.ud-area{font-size:11px;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.ud-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.chip-dot{width:5px;height:5px;border-radius:50%}
.chip-blue{background:var(--blue-light);color:var(--blue);border:1px solid #C5DCF5}.chip-blue .chip-dot{background:#378ADD}
.chip-green{background:var(--green-light);color:var(--green);border:1px solid #B2DFB9}.chip-green .chip-dot{background:#2DA44E}
.chip-amber{background:var(--amber-light);color:var(--amber);border:1px solid #FCD34D}.chip-amber .chip-dot{background:#F59E0B}
.chip-slate{background:#F1F5F9;color:#475569;border:1px solid #E2E8F0}.chip-slate .chip-dot{background:#94A3B8}

/* Investigadores stats grid */
.ud-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
.ud-stat-box{background:#F8FAFF;border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;text-align:center}
.ud-stat-val{font-size:24px;font-weight:800;color:var(--navy);line-height:1;font-family:var(--font-m)}
.ud-stat-lbl{font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;margin-top:4px}
.ud-stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

.ud-divider{height:1px;background:var(--border);margin:16px 0}
.ud-section-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ud-section-lbl::before{content:'';width:3px;height:12px;border-radius:2px;flex-shrink:0}
.lbl-blue::before{background:var(--blue)}
.lbl-green::before{background:var(--green)}
.lbl-amber::before{background:var(--amber)}

/* Líneas de investigación */
.lineas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:320px;overflow-y:auto;padding-right:4px}
.linea-item{background:#F8FAFF;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-size:12px;color:var(--muted);line-height:1.5;display:flex;align-items:flex-start;gap:7px}
.linea-item::before{content:'›';color:var(--blue);font-weight:700;flex-shrink:0;margin-top:1px}

/* Industrias */
.industrias-wrap{display:flex;flex-wrap:wrap;gap:7px}
.ind-pill{font-size:11px;font-weight:600;padding:4px 13px;border-radius:20px;background:var(--blue-light);color:var(--blue);border:1px solid #C5DCF5}

/* Gender bar */
.gender-bar{display:flex;border-radius:6px;overflow:hidden;height:8px;margin-top:4px}
.gender-f{background:#E879A0;transition:width .5s}
.gender-m{background:#60A5FA;flex:1}
.gender-legend{display:flex;gap:12px;margin-top:6px}
.gender-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── SEARCH ───── */
.search-fac-label{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.search-fac-line{flex:1;height:1px;background:var(--border)}
.search-section{margin-bottom:22px}

/* ── EMPTY ───── */
.empty-state{text-align:center;padding:80px 32px}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--muted)}


/* ── EQUIPO DE INVESTIGACIÓN ─────────────────────────────── */
.equipo-section{margin-top:0}
.equipo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;max-height:420px;overflow-y:auto;padding-right:4px}
.inv-card{background:#F8FAFF;border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;display:flex;align-items:center;gap:10px;transition:all .15s}
.inv-card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-sm)}
.inv-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;letter-spacing:-.5px}
.inv-info{flex:1;min-width:0}
.inv-name{font-size:11.5px;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:1px}
.inv-jerarquia{font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:.05em;line-height:1.2}
.inv-email{font-size:10px;color:var(--blue);font-family:var(--font-m);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.equipo-grid::-webkit-scrollbar{width:4px}
.equipo-grid::-webkit-scrollbar-track{background:transparent}
.equipo-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.lineas-grid::-webkit-scrollbar{width:4px}
.lineas-grid::-webkit-scrollbar-track{background:transparent}
.lineas-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>

function avatarColor(name, gender) {
  const colors_f = ['#E879A0','#C084FC','#F472B6','#818CF8','#34D399'];
  const colors_m = ['#3B82F6','#6366F1','#0EA5E9','#10B981','#8B5CF6'];
  const palette = gender === 'F' ? colors_f : colors_m;
  let hash = 0;
  for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xFFFF;
  return palette[hash % palette.length];
}
function avatarInitials(name) {
  const parts = name.trim().split(' ').filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}
function renderEquipo(equipo, facColor) {
  if (!equipo || equipo.length === 0) return '';
  const cards = equipo.map(inv => {
    const color = avatarColor(inv.n, inv.g);
    const ini = avatarInitials(inv.n);
    const emailHtml = inv.e ? `<div class="inv-email">${inv.e}</div>` : '';
    return `<div class="inv-card">
      <div class="inv-avatar" style="background:${color}">${ini}</div>
      <div class="inv-info">
        <div class="inv-name">${inv.n}</div>
        <div class="inv-jerarquia">${inv.j}</div>
        ${emailHtml}
      </div>
    </div>`;
  }).join('');
  return `<div class="ud-divider"></div>
    <div class="ud-section-lbl lbl-green">Equipo de investigación <span style="font-weight:400;color:var(--subtle);font-size:10px;margin-left:4px">(${equipo.length})</span></div>
    <div class="equipo-grid">${cards}</div>`;
}

/* STATE */
let view='grid', activeFac=-1, searchQuery='', expandedUA=-1;

/* HELPERS */
function logoImg(facId){
  if(FAC_LOGOS[facId]) return `<img src="${FAC_LOGOS[facId]}" style="mix-blend-mode:multiply;max-height:100%;max-width:100%;object-fit:contain">`;
  const f=FACULTADES[facId];
  return `<div class="fac-logo-fallback" style="background:${f.color}">${f.name.slice(0,2).toUpperCase()}</div>`;
}

/* FACULTY GRID */
function renderGrid(){
  const inv_by_fac={};
  UAS.forEach(u=>{
    if(!inv_by_fac[u.fac]) inv_by_fac[u.fac]={uas:0,inv:0,pi:0,inds:new Set()};
    inv_by_fac[u.fac].uas++;
    inv_by_fac[u.fac].inv += u.investigadores||0;
    inv_by_fac[u.fac].pi  += u.pi||0;
    (u.industrias||[]).forEach(i=>inv_by_fac[u.fac].inds.add(i));
  });

  let html=`
    <div class="section-header">
      <div>
        <div class="section-title">Unidades Académicas PUCV</div>
        <div class="section-sub">Selecciona una facultad para explorar sus unidades e investigadores</div>
      </div>
      <div class="section-pills">
        <span class="s-pill">${UAS.length} unidades</span>
        <span class="s-pill">9 facultades</span>
      </div>
    </div>
    <div class="fac-grid">`;

  FACULTADES.forEach(fac=>{
    const d = inv_by_fac[fac.id]||{uas:0,inv:0,pi:0,inds:new Set()};
    const topInds=[...d.inds].slice(0,3);
    html+=`
      <button class="fac-card" onclick="openFaculty(${fac.id})">
        <div class="fac-card-stripe" style="background:${fac.color}"></div>
        <div class="fac-card-body">
          <div class="fac-logo-wrap">${logoImg(fac.id)}</div>
          <div class="fac-card-name">${fac.name}</div>
          <div class="fac-card-stats">
            <div class="fac-stat"><span class="fac-stat-val">${d.uas}</span><span class="fac-stat-lbl">Unidades</span></div>
            <div style="width:1px;background:var(--border)"></div>
            <div class="fac-stat"><span class="fac-stat-val">${d.inv}</span><span class="fac-stat-lbl">Investigadores</span></div>
            ${d.pi>0?`<div style="width:1px;background:var(--border)"></div><div class="fac-stat"><span class="fac-stat-val">${d.pi}</span><span class="fac-stat-lbl">Con PI</span></div>`:''}
          </div>
        </div>
        <div class="fac-card-footer">
          <div class="fac-footer-tags">${topInds.map(i=>`<span class="ind-tag">${i}</span>`).join('')}</div>
          <div class="fac-card-arrow" style="background:${fac.color}">›</div>
        </div>
      </button>`;
  });

  html+='</div>';
  document.getElementById('appContent').innerHTML=html;
}

/* FACULTY DETAIL */
function renderFaculty(facId){
  const fac=FACULTADES[facId];
  const uas=UAS.filter(u=>u.fac===facId);
  const totInv=uas.reduce((s,u)=>s+(u.investigadores||0),0);
  const totPi=uas.reduce((s,u)=>s+(u.pi||0),0);
  const totAnid=uas.reduce((s,u)=>s+(u.anid||0),0);

  let html=`
    <button class="back-btn" onclick="goHome()">‹ Volver a Facultades</button>
    <div class="fac-detail-header">
      <div class="fac-detail-stripe" style="background:${fac.color}"></div>
      <div class="fac-detail-body">

            <div style="width:1px;background:var(--border)"></div>
            <div class="fac-ds"><span class="fac-ds-val">${totInv}</span><span class="fac-ds-lbl">Investigadores</span></div>

            ${totAnid>0?`<div style="width:1px;background:var(--border)"></div><div class="fac-ds"><span class="fac-ds-val">${totAnid}</span><span class="fac-ds-lbl">En ANID</span></div>`:''}
          </div>
        </div>
      </div>
    </div>
    <div class="ua-grid">`;

  uas.forEach(u=>{
    const idx=UAS.indexOf(u);
    const isOpen=expandedUA===idx;

      <div class="ua-card-btn" onclick="toggleUA(${idx})">

          <div class="ua-stripe" style="background:${fac.color}"></div>
          <div class="ua-info">
            <div class="ua-tipo">${u.tipo}</div>
            <div class="ua-name">${u.ua}</div>
            <div class="ua-area">${u.area}</div>
          </div>
          <span class="ua-chevron" style="transform:${isOpen?'rotate(90deg)':'rotate(0)'}">&rsaquo;</span>
        </div>
        <div class="ua-card-footer">
          <div class="ua-stat-mini"><strong>${u.investigadores||0}</strong> invest.</div>
          ${(u.pi||0)>0?`<div class="ua-stat-mini"><strong>${u.pi}</strong> con PI</div>`:''}
          ${(u.industrias||[]).slice(0,2).map(i=>`<span class="ind-tag">${i}</span>`).join('')}
        </div>
      </div>`;
    if(isOpen){
      const pctF=u.investigadores>0?Math.round((u.genero_f||0)/u.investigadores*100):0;
      html+=`
      <div class="ua-detail">
        <div class="ua-detail-stripe" style="background:${fac.color}"></div>
        <div class="ua-detail-body">
          <div class="ud-header">
            <div class="ud-logo-box"><img src="${FAC_LOGOS[facId]||''}" style="max-width:100%;max-height:100%;object-fit:contain;padding:5px;mix-blend-mode:multiply"></div>
            <div class="ud-title-block">
              <div class="ud-fac-tag" style="background:${fac.bg};color:${fac.color};border-color:${fac.color}33">${fac.name}</div>
              <div class="ud-title">${u.ua}</div>
              <div class="ud-area">${u.area}</div>
              <div class="ud-chips">
                <span class="chip chip-slate"><span class="chip-dot"></span>${u.tipo}</span>
                ${(u.industrias||[]).map(i=>`<span class="chip chip-blue"><span class="chip-dot"></span>${i}</span>`).join('')}
              </div>
            </div>
          </div>

          <div class="ud-stats-grid">
            <div class="ud-stat-box">
              <div class="ud-stat-val">${u.investigadores||0}</div>
              <div class="ud-stat-lbl">Investigadores</div>
              <div class="ud-stat-sub">Planta activa</div>
            </div>
            <div class="ud-stat-box">
              <div class="ud-stat-val">${u.pi||0}</div>
              <div class="ud-stat-lbl">Con PI</div>
              <div class="ud-stat-sub">Proyectos activos</div>
            </div>
            <div class="ud-stat-box">
              <div class="ud-stat-val">${u.anid||0}</div>
              <div class="ud-stat-lbl">En ANID</div>
              <div class="ud-stat-sub">Perfil registrado</div>
            </div>
            <div class="ud-stat-box">
              <div class="ud-stat-val">${u.titulares||0}</div>
              <div class="ud-stat-lbl">Titulares</div>
              <div class="ud-stat-sub">${u.asociados||0} asoc. · ${u.adjuntos||0} adj.</div>
            </div>
          </div>

          ${(u.investigadores||0)>0?`
          <div class="ud-section-lbl lbl-green">Composición de género</div>
          <div class="gender-bar">
            <div class="gender-f" style="width:${pctF}%"></div>
            <div class="gender-m"></div>
          </div>
          <div class="gender-legend">
            <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div class="gender-dot" style="background:#E879A0"></div>Femenino: ${u.genero_f||0} (${pctF}%)</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div class="gender-dot" style="background:#60A5FA"></div>Masculino: ${u.genero_m||0} (${100-pctF}%)</div>
          </div>`:''}

          ${(u.lineas||[]).length>0?`
          <div class="ud-divider"></div>
          <div class="ud-section-lbl lbl-blue">Líneas de investigación</div>
          <div class="lineas-grid">
            ${(u.lineas||[]).map(l=>`<div class="linea-item">${l}</div>`).join('')}
          </div>`:''}

          ${(u.industrias||[]).length>0?`
          <div class="ud-divider"></div>
          <div class="ud-section-lbl lbl-amber">Áreas de aplicación industrial</div>
          <div class="industrias-wrap">
            ${(u.industrias||[]).map(i=>`<span class="ind-pill">${i}</span>`).join('')}
          </div>`:''}
          ${renderEquipo(u.equipo||[], fac.color)}
        </div>
      </div>`;
    }
  });

  html+='</div>';
  document.getElementById('appContent').innerHTML=html;
  window.scrollTo(0,0);
}

/* SEARCH */
function renderSearch(q){
  const results=UAS.filter(u=>{
    const s=q.toLowerCase();
    return u.ua.toLowerCase().includes(s)||
      u.area.toLowerCase().includes(s)||
      (u.industrias||[]).some(i=>i.toLowerCase().includes(s))||
      (u.lineas||[]).some(l=>l.toLowerCase().includes(s))||
      FACULTADES[u.fac].name.toLowerCase().includes(s);
  });
  if(!results.length){
    document.getElementById('appContent').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Sin resultados</div>
        <div class="empty-sub">No se encontraron unidades para "${q}"</div>
      </div>`;
    return;
  }
  const byFac={};
  results.forEach(u=>{if(!byFac[u.fac])byFac[u.fac]=[];byFac[u.fac].push(u);});
  let html=`
    <div class="section-header">
      <div><div class="section-title">Resultados para "${q}"</div>
      <div class="section-sub">${results.length} unidad${results.length!==1?'es':''} encontrada${results.length!==1?'s':''}</div></div>
      <div class="section-pills"><span class="s-pill">${results.length} resultados</span></div>
    </div>`;
  Object.entries(byFac).forEach(([facId,uas])=>{
    const fac=FACULTADES[parseInt(facId)];
    html+=`<div class="search-section">
      <div class="search-fac-label">
        <div style="width:8px;height:8px;border-radius:50%;background:${fac.color};flex-shrink:0"></div>
        ${fac.name}<div class="search-fac-line"></div>
      </div>
      <div class="ua-grid">`;
    uas.forEach(u=>{
      const idx=UAS.indexOf(u);
      const isOpen=expandedUA===idx;
      html+=`
        <div class="ua-card-btn" onclick="toggleUA(${idx})">
          <div class="ua-card-top">
            <div class="ua-stripe" style="background:${fac.color}"></div>
            <div class="ua-info">
              <div class="ua-tipo">${u.tipo}</div>
              <div class="ua-name">${u.ua}</div>
              <div class="ua-area">${u.area}</div>
            </div>
            <span class="ua-chevron" style="transform:${isOpen?'rotate(90deg)':'rotate(0)'}">&rsaquo;</span>
          </div>
          <div class="ua-card-footer">
            <div class="ua-stat-mini"><strong>${u.investigadores||0}</strong> invest.</div>
            ${(u.pi||0)>0?`<div class="ua-stat-mini"><strong>${u.pi}</strong> con PI</div>`:''}
            ${(u.industrias||[]).slice(0,2).map(i=>`<span class="ind-tag">${i}</span>`).join('')}
          </div>
        </div>`;
      if(isOpen){
        const pctF=u.investigadores>0?Math.round((u.genero_f||0)/u.investigadores*100):0;
        html+=`
        <div class="ua-detail">
          <div class="ua-detail-stripe" style="background:${fac.color}"></div>
          <div class="ua-detail-body">
            <div class="ud-header">
              <div class="ud-logo-box"><img src="${FAC_LOGOS[facId]||''}" style="max-width:100%;max-height:100%;object-fit:contain;padding:5px;mix-blend-mode:multiply"></div>
              <div class="ud-title-block">
                <div class="ud-fac-tag" style="background:${fac.bg};color:${fac.color};border-color:${fac.color}33">${fac.name}</div>
                <div class="ud-title">${u.ua}</div><div class="ud-area">${u.area}</div>
              </div>
            </div>
            <div class="ud-stats-grid">
              <div class="ud-stat-box"><div class="ud-stat-val">${u.investigadores||0}</div><div class="ud-stat-lbl">Investigadores</div></div>
              <div class="ud-stat-box"><div class="ud-stat-val">${u.pi||0}</div><div class="ud-stat-lbl">Con PI</div></div>
              <div class="ud-stat-box"><div class="ud-stat-val">${u.anid||0}</div><div class="ud-stat-lbl">En ANID</div></div>
              <div class="ud-stat-box"><div class="ud-stat-val">${u.titulares||0}</div><div class="ud-stat-lbl">Titulares</div></div>
            </div>
            ${(u.lineas||[]).length>0?`
            <div class="ud-divider"></div>
            <div class="ud-section-lbl lbl-blue">Líneas de investigación</div>
            <div class="lineas-grid">${(u.lineas||[]).map(l=>`<div class="linea-item">${l}</div>`).join('')}</div>`:''}
          ${renderEquipo(u.equipo||[], fac.color)}
          </div>
        </div>`;
      }
    });
    html+='</div></div>';
  });
  document.getElementById('appContent').innerHTML=html;
}

/* INTERACTIONS */
function openFaculty(facId){view='faculty';activeFac=facId;expandedUA=-1;renderFaculty(facId);}
function goHome(){view='grid';activeFac=-1;searchQuery='';expandedUA=-1;document.getElementById('searchInput').value='';renderGrid();}
function onSearch(val){
  searchQuery=val.trim();
  if(!searchQuery){goHome();return;}
  view='search';expandedUA=-1;renderSearch(searchQuery);
}
function toggleUA(idx){
  expandedUA=expandedUA===idx?-1:idx;
  if(view==='faculty') renderFaculty(activeFac);
  else renderSearch(searchQuery);
}

renderGrid();
</script>
</body>
</html>
